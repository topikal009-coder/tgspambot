<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Sender - Регистрация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0b1a3a 0%, #1a3b5e 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #a0aec0;
            font-weight: 500;
            font-size: 0.9em;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 15px;
            color: #fff;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(0, 0, 0, 0.3);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.5);
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
            color: #a0aec0;
        }

        .auth-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
        }

        .status.error {
            background: rgba(245, 101, 101, 0.2);
            color: #feb2b2;
            border: 1px solid #f56565;
        }

        .status.success {
            background: rgba(72, 187, 120, 0.2);
            color: #9ae6b4;
            border: 1px solid #48bb78;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>📱 Telegram Sender</h1>
        <h2 style="color: #fff; text-align: center; margin-bottom: 30px;">Регистрация</h2>
        
        <div class="form-group">
            <label>👤 Имя пользователя</label>
            <input type="text" id="username" placeholder="username">
        </div>
        
        <div class="form-group">
            <label>🔑 Пароль (минимум 6 символов)</label>
            <input type="password" id="password" placeholder="••••••">
        </div>
        
        <div class="form-group">
            <label>🔑 Подтверждение пароля</label>
            <input type="password" id="confirm_password" placeholder="••••••">
        </div>
        
        <button onclick="register()">Зарегистрироваться</button>
        
        <div class="auth-links">
            Уже есть аккаунт? <a href="/login">Войти</a>
        </div>
        
        <div id="status" class="status" style="display: none;"></div>
    </div>

    <script>
        async function register() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const statusDiv = document.getElementById('status');
            
            if (!username || !password || !confirm) {
                showStatus('Заполните все поля', 'error');
                return;
            }
            
            if (password !== confirm) {
                showStatus('Пароли не совпадают', 'error');
                return;
            }
            
            if (password.length < 6) {
                showStatus('Пароль должен быть минимум 6 символов', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showStatus('Регистрация успешна! Перенаправление...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    showStatus(data.error, 'error');
                }
            } catch (error) {
                showStatus('Ошибка соединения', 'error');
            }
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            statusDiv.style.display = 'block';
            
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
